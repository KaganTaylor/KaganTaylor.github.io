# Copies Diplomacy players' submitted moves into each game gist's per-power
# moves-<power>.json files, for games whose deadline has passed. See
# diplomacy/tools/publish-moves.js.
#
# This workflow NEVER runs on a schedule — trigger it manually from the
# Actions tab when wanted. It is an optional convenience: the app itself
# reveals auto-publish games' moves the moment the deadline passes, and in
# manual-publish games the game master publishes from the app after review.
# Running this just writes auto-mode submissions into the moves files as a
# durable record.
#
# Requires the repository secret DIPLOMACY_GIST_TOKEN: the game master's
# classic personal access token with ONLY the "gist" scope (the same token
# used to publish games from the app).
name: Publish Diplomacy moves

on:
  workflow_dispatch: # manual runs only — no schedule, no polling

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Publish submitted moves
        run: node diplomacy/tools/publish-moves.js
        env:
          DIPLOMACY_GIST_TOKEN: ${{ secrets.DIPLOMACY_GIST_TOKEN }}
